<div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
    <div>
        <h2 class="section-title">Stock</h2>
        <p class="section-subtitle">Consulta cantidades por producto y almacén.</p>
    </div>
</div>

<div class="toolbar">
    <div>
        <button onclick="cargarStock()" class="btn btn-primary btn-icon">
            <span>↻</span>
            <span>Actualizar</span>
        </button>
    </div>

    <div class="toolbar-group">
        <label class="form-label mb-1">Filtrar por almacén</label>
        <select id="filtroAlmacen" class="form-select">
            <option value="">Todos los almacenes</option>
        </select>
    </div>

    <div class="toolbar-group search-box">
        <label class="form-label mb-1">Buscar producto</label>
        <input
            type="text"
            id="buscadorStock"
            class="form-control"
            placeholder="Buscar producto..."
        >
    </div>
</div>

<div class="table-card">
    <div class="table-responsive">
        <table class="table table-hover table-striped align-middle mb-0" id="tablaStock">
            <thead class="text-center">
                <tr>
                    <th>Producto</th>
                    <th>Almacén</th>
                    <th>Cantidad</th>
                </tr>
            </thead>
            <tbody class="text-center"></tbody>
        </table>
    </div>
</div>
