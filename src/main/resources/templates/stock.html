<h2 class="mb-4"> Stock</h2>

<div class="d-flex gap-2 mb-3 flex-wrap">

    <button onclick="cargarStock()" class="btn btn-sm btn-primary">
         Actualizar
    </button>

    <select id="filtroAlmacen" class="form-select form-select-sm" style="max-width:200px;">
        <option value="">Todos los almacenes</option>
    </select>

    <input
            type="text"
            id="buscadorStock"
            class="form-control form-control-sm"
            placeholder=" Buscar producto..."
            style="max-width:250px;"
    >

</div>

<div class="table-responsive">
    <table class="table table-bordered table-hover align-middle" id="tablaStock">

        <thead class="table-dark text-center">
        <tr>
            <th>Producto</th>
            <th>Almacén</th>
            <th>Cantidad</th>
        </tr>
        </thead>

        <tbody class="text-center">
        <!-- Se llena dinámicamente -->
        </tbody>

    </table>
</div>
