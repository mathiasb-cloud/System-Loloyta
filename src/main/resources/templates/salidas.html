<div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
    <div>
        <h2 class="section-title">Salidas</h2>
        <p class="section-subtitle">Registra despachos y movimientos de salida del almacén.</p>
    </div>
</div>

<div class="main-card p-3 mb-4">
    <div class="row g-3">
        <div class="col-md-6 col-lg-4">
            <label class="form-label">Almacén</label>
            <select id="almacenSalida" class="form-select"></select>
        </div>
    </div>
</div>

<div class="main-card p-3 mb-4">
    <h5 class="mb-3">Buscar Producto</h5>

    <div class="row g-3">
        <div class="col-lg-6">
            <div class="search-box">
                <input
                    type="text"
                    id="buscadorSalida"
                    class="form-control"
                    placeholder="Escribe producto..."
                >
            </div>
        </div>
    </div>

    <div id="resultadosSalida" class="list-group shadow-sm mt-3" style="max-width: 500px;"></div>
</div>

<div class="main-card p-3 mb-4">
    <h5 class="mb-3">Lista de Salida</h5>

    <div class="table-card">
        <div class="table-responsive">
            <table class="table table-hover table-striped align-middle mb-0" id="tablaSalida">
                <thead class="text-center">
                    <tr>
                        <th>Categoría</th>
                        <th>Producto</th>
                        <th>Unidad</th>
                        <th>Cant. Despacho</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody class="text-center"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="d-flex flex-wrap gap-2">
    <button onclick="crearSalida()" class="btn btn-success btn-icon">
        <span>💾</span>
        <span>Guardar Salida</span>
    </button>

    <button onclick="confirmarSalida()" class="btn btn-danger btn-icon">
        <span>✔</span>
        <span>Confirmar Salida</span>
    </button>
</div>
