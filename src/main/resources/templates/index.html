        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuTop">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse mt-3 mt-lg-0" id="menuTop">
            <ul class="navbar-nav ms-lg-4 nav-dashboard">
                <li class="nav-item">
                    <a class="nav-link text-white" href="#" onclick="cargar(event, '/productos', this)">Productos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="#" onclick="cargar(event, '/ordenes', this)">Ordenes</a>

                <li class="nav-item">
                    <a class="nav-link text-white" href="#" onclick="cargar(event, '/stock', this)">Stock</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="#" onclick="cargar(event, '/movimientos', this)">Movimientos</a>
                </li>
            </ul>
        </div>
    </div>

            <h3 class="section-title mb-2">Bienvenido</h3>
