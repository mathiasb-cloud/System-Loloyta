<!DOCTYPE html>
<html>
<head>
    <title>Sistema Loloyta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1"> Sistema Loloyta</span>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- MENÚ -->
        <div class="col-3 col-md-2 bg-dark text-white vh-100 p-3">
            <h5 class="text-center">Menú</h5>
            <hr>

            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link text-white" href="#" onclick="cargar(event, '/ordenes')"> Ordenes</a>
                </li>
				<li class="nav-item">
				    <a class="nav-link text-white" href="#" onclick="cargar(event, '/salidas')"> Salidas</a>
				</li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="#" onclick="cargar(event, '/stock')"> Stock</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="#" onclick="cargar(event, '/movimientos')"> Movimientos</a>
                </li>
            </ul>
        </div>

        <!-- CONTENIDO -->
        <div class="col-9 col-md-10 p-4">
            <div id="contenido" class="card shadow p-4">
                <h3>Bienvenido </h3>
                <p>Selecciona una opción del menú</p>
            </div>
        </div>

    </div>
</div>


<script>
    let ordenId = null;
    let productosGlobal = [];
    let stockGlobal = [];

    // ========================
    // CARGAR VISTAS
    // ========================
    function cargar(event, url) {
        event.preventDefault();

        fetch(url)
            .then(res => res.text())
            .then(html => {
                document.getElementById("contenido").innerHTML = html;

                setTimeout(() => {
                    if (url.includes("stock")) initStock();
                    if (url.includes("ordenes")) initOrdenes();
					if (url.includes("salidas")) initSalidas();
                    if (url.includes("movimientos")) initMovimientos();
                }, 100);
            });
    }

    // ========================
    // STOCK (🔥 INTEGRADO)
    // ========================
    function initStock() {
        console.log("INIT STOCK");

        cargarStock();
        cargarAlmacenesStock();

        document.getElementById("buscadorStock")
            ?.addEventListener("keyup", filtrarStock);

        document.getElementById("filtroAlmacen")
            ?.addEventListener("change", filtrarStock);
    }

    async function cargarStock() {
        let res = await fetch('/api/stock');
        let data = await res.json();

        stockGlobal = data;
        renderStock(data);
    }

    function renderStock(data) {
        let tbody = document.querySelector("#tablaStock tbody");
        if (!tbody) return;

        tbody.innerHTML = "";

        data.forEach(s => {
            tbody.innerHTML += `
                <tr>
                    <td>${s.producto?.nombre || "N/A"}</td>
                    <td>${s.almacenes?.nombre || "N/A"}</td>
                    <td>${s.cantidad ?? 0}</td>
                </tr>
            `;
        });
    }

    async function cargarAlmacenesStock() {
        let res = await fetch('/api/almacenes');
        let data = await res.json();

        let select = document.getElementById("filtroAlmacen");
        if (!select) return;

        select.innerHTML = `<option value="">Todos</option>`;

        data.forEach(a => {
            select.innerHTML += `<option value="${a.id}">${a.nombre}</option>`;
        });
    }

    function filtrarStock() {
        let texto = document.getElementById("buscadorStock")?.value.toLowerCase() || "";
        let almacenId = document.getElementById("filtroAlmacen")?.value;

        let filtrados = stockGlobal.filter(s => {
            let nombre = s.producto?.nombre?.toLowerCase() || "";
            let coincideNombre = nombre.includes(texto);
            let coincideAlmacen = !almacenId || s.almacenes?.id == almacenId;

            return coincideNombre && coincideAlmacen;
        });

        renderStock(filtrados);
    }

    // ========================
    // ORDENES
    // ========================
    async function initOrdenes() {
        await cargarAlmacenes();
        await cargarProductos();

        document.getElementById("buscador")
            ?.addEventListener("keyup", function() {
                let texto = this.value.toLowerCase();
                let resultadosDiv = document.getElementById("resultados");
                resultadosDiv.innerHTML = "";

                if (texto.length === 0) return;

                let filtrados = productosGlobal.filter(p =>
                    p.nombre.toLowerCase().includes(texto)
                );

                filtrados.forEach(p => {
                    let item = document.createElement("div");
                    item.innerText = p.nombre;
                    item.style.cursor = "pointer";
                    item.onclick = () => agregarProductoTabla(p);
                    resultadosDiv.appendChild(item);
                });
            });
    }

    async function cargarAlmacenes() {
        let res = await fetch('/api/almacenes');
        let data = await res.json();

        let select = document.getElementById("almacenSelect");
        if (!select) return;

        select.innerHTML = "";

        data.forEach(a => {
            select.innerHTML += `<option value="${a.id}">${a.nombre}</option>`;
        });
    }

    async function cargarProductos() {
        let res = await fetch('/api/productos');
        let json = await res.json();

        productosGlobal = json.content || json || [];
    }

    function agregarProductoTabla(producto) {
        let tabla = document.getElementById("tablaProductos");
        if (!tabla) return;

        let filas = tabla.querySelectorAll("tr");

        for (let i = 1; i < filas.length; i++) {
            if (filas[i].children[0].innerText === producto.nombre) return;
        }

        let fila = tabla.insertRow();

        fila.innerHTML = `
            <td data-id="${producto.id}">${producto.nombre}</td>
            <td><input type="number" value="1"></td>
            <td><input type="number" value="0"></td>
            <td><button onclick="eliminarFila(this)">X</button></td>
        `;
    }

    function eliminarFila(btn) {
        btn.parentElement.parentElement.remove();
    }

    async function crearOrden() {
        let res = await fetch('/api/ordenes-compra', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                metodoPago: document.getElementById("metodoPago").value,
                estado: "PENDIENTE",
                almacenes: { id: document.getElementById("almacenSelect").value },
                usuario: { id: 1 }
            })
        });

        let data = await res.json();
        ordenId = data.id;

        alert("Orden creada");
        await guardarDetalles();
    }

    async function guardarDetalles() {
        let filas = document.querySelectorAll("#tablaProductos tr");

        for (let i = 1; i < filas.length; i++) {
            let celdas = filas[i].querySelectorAll("td");
            let inputs = filas[i].querySelectorAll("input");

            await fetch('/api/detalle-orden-compra', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    ordenCompra: { id: ordenId },
                    producto: { id: celdas[0].dataset.id },
                    cantidad: inputs[0].value,
                    precioUnitario: inputs[1].value
                })
            });
        }

        alert("Productos guardados");
    }

    async function confirmarOrden() {
        await fetch(`/api/ordenes-compra/${ordenId}/estado?estado=CONFIRMADA`, {
            method: 'PATCH'
        });

        alert("Orden confirmada");
    }

// MOVIMIENTOS
    async function initMovimientos() {
        await cargarMovimientos();
    }

    async function cargarMovimientos() {
        let res = await fetch('/api/movimientos/resumen');
        let data = await res.json();

        let tbody = document.querySelector("#tablaMovimientos tbody");
        if (!tbody) return;

        tbody.innerHTML = "";

        data.forEach(m => {
            tbody.innerHTML += `
                <tr>
                    <td>${m.tipo}</td>
                    <td>${m.fecha}</td>
                    <td>${m.totalItems} productos</td>
                </tr>
            `;
        });
    }
	
	
	
	
	// ========================
	// SALIDAS
	// ========================
	let salidaId = null;
	let productosSalidaGlobal = [];

	async function initSalidas() {
	    await cargarAlmacenesSalida();
	    await cargarProductosSalida();

	    document.getElementById("buscadorSalida")
	        ?.addEventListener("keyup", function() {

	            let texto = this.value.toLowerCase();
	            let resultadosDiv = document.getElementById("resultadosSalida");
	            resultadosDiv.innerHTML = "";

	            if (texto.length === 0) return;

	            let filtrados = productosSalidaGlobal.filter(p =>
	                p.nombre.toLowerCase().includes(texto)
	            );

	            filtrados.forEach(p => {

	                let item = document.createElement("div");
	                item.className = "list-group-item list-group-item-action";
	                item.innerText = p.nombre;

	                item.onclick = () => agregarProductoSalida(p);

	                resultadosDiv.appendChild(item);
	            });
	        });
	}

	async function cargarAlmacenesSalida() {
	    let res = await fetch('/api/almacenes');
	    let data = await res.json();

	    let select = document.getElementById("almacenSalida");
	    if (!select) return;

	    select.innerHTML = "";

	    data.forEach(a => {
	        select.innerHTML += `<option value="${a.id}">${a.nombre}</option>`;
	    });
	}

	async function cargarProductosSalida() {
	    let res = await fetch('/api/productos');
	    let json = await res.json();

	    productosSalidaGlobal = json.content || json || [];
	}

	function agregarProductoSalida(producto) {

	    let tabla = document.querySelector("#tablaSalida tbody");

	    let filas = tabla.querySelectorAll("tr");

	    for (let i = 0; i < filas.length; i++) {
	        if (filas[i].dataset.id == producto.id) return;
	    }

	    let fila = document.createElement("tr");
	    fila.dataset.id = producto.id;

	    fila.innerHTML = `
	        <td>${producto.categoria?.nombre || "N/A"}</td>
	        <td>${producto.nombre}</td>
	        <td>${producto.unidadMedida || "N/A"}</td>
	        <td><input type="number" class="form-control" value="1"></td>
	        <td><button class="btn btn-sm btn-danger" onclick="eliminarFilaSalida(this)">X</button></td>
	    `;

	    tabla.appendChild(fila);
	}

	function eliminarFilaSalida(btn) {
	    btn.parentElement.parentElement.remove();
	}

	async function crearSalida() {

	    let res = await fetch('/api/salidas', {
	        method: 'POST',
	        headers: { 'Content-Type': 'application/json' },
	        body: JSON.stringify({
	            almacenes: { id: document.getElementById("almacenSalida").value },
	            usuario: { id: 1 }
	        })
	    });

	    let data = await res.json();

	    console.log("SALIDA CREADA:", data);

	    salidaId = data.id;

	    if (!salidaId) {
	        alert("Error: no se creó la salida");
	        return;
	    }

	    await guardarDetalleSalida();
	}

	async function guardarDetalleSalida() {

	    let filas = document.querySelectorAll("#tablaSalida tbody tr");

	    for (let i = 0; i < filas.length; i++) {

	        let input = filas[i].querySelector("input");

	        let cantidad = input.value;

	        let res = await fetch('/api/detalle-salida', {
	            method: 'POST',
	            headers: { 'Content-Type': 'application/json' },
	            body: JSON.stringify({
	                salida: { id: salidaId },
	                producto: { id: filas[i].dataset.id },
	                cantidadDespacho: cantidad
	            })
	        });

	        console.log("DETALLE:", await res.json());
	    }

	    alert("Detalle guardado");
	}

	async function confirmarSalida() {

	    if (!salidaId) {
	        alert("Primero guarda la salida");
	        return;
	    }

	    let res = await fetch(`/api/salidas/${salidaId}/confirmar`, {
	        method: 'PATCH'
	    });

	    let data = await res.json();

	    console.log("CONFIRMAR:", data);

	    alert("Salida confirmada");
	}
</script>
</body>
</html>
