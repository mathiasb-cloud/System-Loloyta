<div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
    <div>
        <h2 class="section-title">Ingresos</h2>
        <p class="section-subtitle">Registra compras e ingresos de productos al almacén.</p>
    </div>
</div>

<div class="main-card p-3 mb-4">
    <div class="row g-3">
        <div class="col-md-6 col-lg-4">
            <label class="form-label">Almacén</label>
            <select id="almacenSelect" class="form-select"></select>
        </div>

        <div class="col-md-6 col-lg-4">
            <label class="form-label">Método de Pago</label>
            <select id="metodoPago" class="form-select">
                <option value="YAPE">YAPE</option>
                <option value="EFECTIVO">EFECTIVO</option>
            </select>
        </div>
    </div>
</div>

<div class="main-card p-3 mb-4">
    <h5 class="mb-3">Buscar Producto</h5>

    <div class="row g-3">
        <div class="col-lg-6">
            <div class="search-box">
                <input
                    type="text"
                    id="buscador"
                    class="form-control"
                    placeholder="Escribe producto..."
                >
            </div>
        </div>
    </div>

    <div id="resultados" class="list-group shadow-sm mt-3" style="max-width: 500px;"></div>
</div>

<div class="main-card p-3 mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Lista de Compra</h5>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="table table-hover table-striped align-middle mb-0" id="tablaProductos">
                <thead class="text-center">
                    <tr>
                        <th>Producto</th>
                        <th style="width:140px;">Cantidad</th>
                        <th style="width:140px;">Precio</th>
                        <th style="width:90px;">Acción</th>
                    </tr>
                </thead>
                <tbody class="text-center"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="d-flex flex-wrap gap-2">
    <button onclick="crearOrden()" class="btn btn-success btn-icon">
        <span>💾</span>
        <span>Guardar Orden</span>
    </button>

    <button onclick="confirmarOrden()" class="btn btn-primary btn-icon">
        <span>✔</span>
        <span>Confirmar Orden</span>
    </button>
</div>
