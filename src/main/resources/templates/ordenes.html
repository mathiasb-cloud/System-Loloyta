<h2 class="mb-4">Ingresos</h2>

<div class="row g-3 mb-4">

    <div class="col-md-4">
        <label class="form-label">Almacén</label>
        <select id="almacenSelect" class="form-select"></select>
    </div>

    <div class="col-md-4">
        <label class="form-label">Método de Pago</label>
        <select id="metodoPago" class="form-select">
            <option value="YAPE">YAPE</option>
            <option value="EFECTIVO">EFECTIVO</option>
        </select>
    </div>

</div>

<div class="mb-4">
    <h5>Buscar Producto</h5>

    <input
            type="text"
            id="buscador"
            class="form-control mb-2"
            placeholder="Escribe producto..."
    >

    <div id="resultados" class="list-group shadow-sm" style="max-width:400px;"></div>
</div>
<div class="mb-4">
    <h5>Lista de Compra</h5>

    <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle" id="tablaProductos">
            <thead class="table-dark text-center">
            <tr>
                <th>Producto</th>
                <th style="width:120px;">Cantidad</th>
                <th style="width:120px;">Precio</th>
                <th style="width:80px;">Acción</th>
            </tr>
            </thead>
            <tbody class="text-center">
            </tbody>
        </table>
    </div>
</div>

<div class="d-flex gap-2">
    <button onclick="crearOrden()" class="btn btn-success">
        Guardar Orden
    </button>

    <button onclick="confirmarOrden()" class="btn btn-primary">
        Confirmar Orden
    </button>
</div>
