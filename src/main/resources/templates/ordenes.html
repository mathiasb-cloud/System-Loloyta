<div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
    <div>
        <h2 class="section-title">Ingresos</h2>
        <p class="section-subtitle">Registra compras e ingresos de productos al almacén.</p>
    </div>
</div>

<div class="main-card p-3 mb-4">
    <div class="row g-3 align-items-end">
        <div class="col-md-6 col-lg-4">
            <label class="form-label">Almacén</label>
            <select id="almacenSelect" class="form-select"></select>
        </div>

        <div class="col-md-6 col-lg-8">
            <div id="estadoOrdenBox" class="small text-muted"></div>
        </div>
    </div>
</div>

<div class="main-card p-3 mb-4">
    <h5 class="mb-3">Buscar Producto</h5>

    <div class="row g-3">
        <div class="col-lg-6">
            <div class="search-box position-relative">
                <input
                    type="text"
                    id="buscador"
                    class="form-control"
                    placeholder="Buscar producto por nombre..."
                    autocomplete="off"
                >
            </div>
            <div id="resultados" class="list-group shadow-sm mt-2 resultados-buscador-orden"></div>
        </div>
    </div>
</div>

<div class="main-card p-3 mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h5 class="mb-0">Lista de Compra</h5>
        <div id="resumenOrden" class="small text-muted"></div>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="table table-hover table-striped align-middle mb-0" id="tablaProductos">
                <thead class="text-center">
                    <tr>
                        <th>Producto</th>
                        <th style="width:140px;">Cantidad</th>
                        <th style="width:140px;">Precio</th>
                        <th style="width:180px;">Método de Pago</th>
                        <th style="width:140px;">Importe</th>
                        <th style="width:90px;">Acción</th>
                    </tr>
                </thead>
                <tbody class="text-center"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="d-flex flex-wrap gap-2">
    <button id="btnGuardarOrden" onclick="guardarOrden()" class="btn btn-success btn-icon">
        <i class="bi bi-save me-2"></i>
        <span>Guardar Orden</span>
    </button>

    <button id="btnConfirmarOrden" onclick="confirmarOrden()" class="btn btn-primary btn-icon">
        <i class="bi bi-check2-circle me-2"></i>
        <span>Confirmar Orden</span>
    </button>

    <button id="btnCancelarOrden" onclick="cancelarOrden()" class="btn btn-outline-secondary btn-icon">
        <i class="bi bi-x-circle me-2"></i>
        <span>Cancelar</span>
    </button>
</div>
